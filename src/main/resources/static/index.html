<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页</title>
    <link rel="stylesheet" href="./static/css/index.css">
    <link rel="stylesheet" href="./static/css/reset.css">
    <script src="./static/js/vue.js" type="text/javascript" charset="utf-8"></script>
    <script src="./static/js/index.js" type="text/javascript" charset="utf-8"></script>
    <script src="./static/js/jquery-1.11.3.js" type="text/javascript" charset="utf-8"></script>
    <script src="./static/js/My.js" type="text/javascript" charset="utf-8"></script>
    <style>
        html,body{
            background-color: gainsboro;
            height: 100%;
        }
        #app{
            position: relative;
            height: 100%;
        }
        div.main{
            position: absolute;
            width: 350px;
            height: 250px;
            border: 1px solid rgba(0,0,0,0.2);
            border-radius: 8px;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
            background-color: white;
            left: calc(50% - 175px);
            top: calc(50% - 100px); 
        }
        div.main-top{
            width: 100%;
            height: 40px;
            border-bottom: 1px solid rgba(0,0,0,0.2);
            text-align: center;
            font-size: 1.2em;
            line-height: 40px;
        }
        img.logo{
            position: absolute;
            left: 10px;
            top: 5px;
            height: 30px;
        }
        div.main-root{
            width: 100%;
            height: 170px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="main">
            <div class="main-top">
                <img :src="nav.logo" alt="" class="logo">
                {{nav.title}}
            </div>
            <div class="main-root">
                <el-row :gutter="0">
                    <el-col :span="20" :offset="2" class="t-20">
                        <el-input v-model="username" placeholder="" size="normal" clearable @change="">
                            <template slot="prepend">账号</template>
                        </el-input>
                    </el-col>
                </el-row>
                <el-row :gutter="0">
                    <el-col :span="20" :offset="2" class="t-20">
                        <el-input v-model="password" type="password" placeholder="" size="normal" clearable @change="">
                            <template slot="prepend">密码</template>
                        </el-input>
                    </el-col>
                </el-row>
                <el-row :gutter="0">
                    <el-col :span="20" :offset="2" class="t-20">
                        <el-button style="width: 100%;" type="success" size="default" @click="login">登录</el-button>
                    </el-col>
                </el-row>
                
            </div>
        </div>
    </div>

    <script>
        var vue = new Vue({
            el:'#app',
            data:{
                nav:{},
                username:'',
                password:''
            },
            methods: {
                // type[success,warning,info,error]
                myNotice(title,message,type){
                    this.$notify({
                        title,
                        message,
                        type,
                        duration: 0
                    });
                },
                // type[success,warning,info,error]
                myMessage(type,message,duration){
                    if(duration==undefined || duration==null){duration = 1500;}
                    this.$message({type,message,duration});
                },
                myAlert(title,content,yesCb){
                    this.$alert(content, title, {
                        confirmButtonText: '确定',
                        callback: ()=>{
                            yesCb();
                        }
                    });
                },
                myConfirm(title,content,yesCb,noCb){
                    this.$confirm(content, title, {
                        confirmButtonText: '确定',
                        cancelButtonText: '取消',
                        callback: (e)=>{
                            switch(e){
                                case 'confirm':yesCb();break;
                                case 'cancel':noCb();break;
                            }
                        }
                    });
                },
                login(){
                    $.post('user/login',{
                        username:this.username,
                        password:this.password
                    },(data)=>{
                        if(data.result == 1){
                            window.location.href = './main.html';
                        }else {
                            this.myMessage('error',data.msg);
                        }
                    })
                }
            },
        })


        $(()=>{
            $.getJSON('./data/nav.json',(data)=>{
                vue.nav = data;
            })
        })
    </script>
</body>
</html>
