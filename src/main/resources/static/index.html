<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - OPEN-Panel</title>
    <link rel="stylesheet" href="./static/css/index.css">
    <link rel="stylesheet" href="./static/css/reset.css">
    <script src="./static/js/vue.js" type="text/javascript" charset="utf-8"></script>
    <script src="./static/js/index.js" type="text/javascript" charset="utf-8"></script>
    <script src="./static/js/jquery-1.11.3.js" type="text/javascript" charset="utf-8"></script>
    <script src="./static/js/My.js" type="text/javascript" charset="utf-8"></script>
    <style>
        * { box-sizing: border-box; }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            color: #1d2129;
        }

        #app {
            height: 100%;
            display: flex;
        }

        /* Left panel - brand */
        .login-left {
            flex: 1;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            position: relative;
            overflow: hidden;
        }

        .login-left::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 1px;
            background: #e5e6eb;
        }

        .brand-icon {
            width: 72px;
            height: 72px;
            border-radius: 16px;
            background: #e8f3ff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        .brand-title {
            font-size: 28px;
            font-weight: 600;
            color: #1d2129;
            margin-bottom: 8px;
        }

        .brand-version {
            display: inline-block;
            background: #e8f3ff;
            color: #165dff;
            font-size: 12px;
            font-weight: 500;
            padding: 2px 10px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .brand-desc {
            font-size: 15px;
            color: #86909c;
            text-align: center;
            line-height: 1.8;
            max-width: 340px;
        }

        .brand-features {
            margin-top: 48px;
            display: flex;
            gap: 36px;
        }

        .brand-feature-item {
            text-align: center;
        }

        .brand-feature-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
        }

        .brand-feature-icon.f1 { background: #e8f3ff; }
        .brand-feature-icon.f2 { background: #e8ffea; }
        .brand-feature-icon.f3 { background: #f0e8ff; }

        .brand-feature-item span {
            font-size: 12px;
            color: #86909c;
        }

        /* Right panel - form */
        .login-right {
            width: 480px;
            min-width: 480px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            background: #f5f7fa;
        }

        .login-card {
            width: 100%;
            max-width: 340px;
        }

        .login-card h2 {
            font-size: 22px;
            font-weight: 600;
            color: #1d2129;
            margin-bottom: 6px;
        }

        .login-card .login-subtitle {
            font-size: 14px;
            color: #86909c;
            margin-bottom: 36px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #4e5969;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            height: 42px;
            border: 1px solid #e5e6eb;
            border-radius: 6px;
            padding: 0 14px;
            font-size: 14px;
            color: #1d2129;
            background: #fff;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            border-color: #165dff;
            box-shadow: 0 0 0 2px rgba(22,93,255,0.1);
        }

        .form-input::placeholder {
            color: #c9cdd4;
        }

        .login-btn {
            width: 100%;
            height: 42px;
            border: none;
            border-radius: 6px;
            background: #165dff;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .login-btn:hover {
            background: #4080ff;
        }

        .login-btn:active {
            background: #0e4bdb;
        }

        .login-footer {
            margin-top: 48px;
            text-align: center;
            font-size: 12px;
            color: #c9cdd4;
        }

        @media (max-width: 960px) {
            #app { flex-direction: column; }
            .login-left {
                padding: 40px 24px;
                min-height: auto;
            }
            .login-left::after { display: none; }
            .brand-features { display: none; }
            .brand-desc { display: none; }
            .login-right {
                width: 100%;
                min-width: unset;
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="login-left">
            <div class="brand-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#165dff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="2" width="20" height="8" rx="2"/>
                    <rect x="2" y="14" width="20" height="8" rx="2"/>
                    <line x1="6" y1="6" x2="6.01" y2="6"/>
                    <line x1="6" y1="18" x2="6.01" y2="18"/>
                </svg>
            </div>
            <div class="brand-title">OPEN-Panel</div>
            <div class="brand-version">v1.0</div>
            <div class="brand-desc">轻量级主机管理与持续交付平台<br>SSH 终端 / Docker 容器 / Jenkins 构建一体化运维</div>
            <div class="brand-features">
                <div class="brand-feature-item">
                    <div class="brand-feature-icon f1">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#165dff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/></svg>
                    </div>
                    <span>主机管理</span>
                </div>
                <div class="brand-feature-item">
                    <div class="brand-feature-icon f2">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00b42a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                    </div>
                    <span>服务监控</span>
                </div>
                <div class="brand-feature-item">
                    <div class="brand-feature-icon f3">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#722ed1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                    </div>
                    <span>持续集成</span>
                </div>
            </div>
        </div>

        <div class="login-right">
            <div class="login-card">
                <h2>登录</h2>
                <p class="login-subtitle">请输入账号和密码</p>

                <div class="form-group">
                    <label class="form-label">账号</label>
                    <input class="form-input" type="text" v-model="username" placeholder="请输入账号" @keyup.enter="$refs.pwdInput.focus()">
                </div>

                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input class="form-input" ref="pwdInput" type="password" v-model="password" placeholder="请输入密码" @keyup.enter="login">
                </div>

                <button class="login-btn" @click="login">登 录</button>
            </div>

            <div class="login-footer">OPEN-Panel v1.0</div>
        </div>
    </div>

    <script>
        var vue = new Vue({
            el: '#app',
            data: {
                nav: {},
                username: '',
                password: ''
            },
            methods: {
                myMessage(type, message, duration) {
                    if (duration == undefined || duration == null) { duration = 1500; }
                    this.$message({ type, message, duration });
                },
                login() {
                    if (!this.username) {
                        this.myMessage('warning', '请输入账号');
                        return;
                    }
                    if (!this.password) {
                        this.myMessage('warning', '请输入密码');
                        return;
                    }
                    $.post('user/login', {
                        username: this.username,
                        password: this.password
                    }, (data) => {
                        if (data.result == 1) {
                            window.location.href = './main.html';
                        } else {
                            this.myMessage('error', data.msg);
                        }
                    })
                }
            }
        });

        $(() => {
            $.getJSON('./data/nav.json', (data) => {
                vue.nav = data;
                document.title = '登录 - ' + data.title;
            })
        })
    </script>
</body>
</html>
